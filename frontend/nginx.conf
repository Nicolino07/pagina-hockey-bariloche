server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: todas las rutas al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache para assets
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Seguridad
    server_tokens off;
}